{% if value | length > max_length %}
    <div class="d-flex">
        <button class="btn btn-light btn-sm"
            aria-label="{{ _('View Details') }}"
            onclick="document.getElementById('{{ modal_id }}').showModal()"> <i class="fa fa-up-right-from-square"></i>
        </button>
    </div>

    <dialog id="{{ modal_id }}" class="border-0 rounded border-primary-subtle p-3" style="max-width: 700px;">
        <h2>{{ modal_title }}</h2>

        <pre class="overflow-auto bg-body-tertiary p-2 fs-5" style="white-space: pre-wrap;">{{ value }}</pre>

        <div class="d-flex justify-content-end">
            <button class="btn btn-light" onclick="document.getElementById('{{ modal_id }}').close()">
                {{ _('Close') }}
            </button>
        </div>
    </dialog>
{% endif %}
